<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoherenceBench Replay Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; }
.header { padding: 16px 24px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
.header .stats { font-size: 13px; color: #8b949e; }
.header .stats span { margin-left: 16px; }
.header .stats .da { color: #58a6ff; }
.header .stats .dfg { color: #f85149; }

.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto 1fr; gap: 1px; background: #21262d; height: calc(100vh - 52px); }
.pane { background: #0d1117; padding: 12px 16px; overflow: auto; }
.pane-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }

.chart-pane { grid-column: 1 / -1; height: 220px; }
.heatmap-pane { grid-column: 1 / -1; height: 140px; overflow-x: auto; }
.transcript-pane { min-height: 300px; }
.score-pane { min-height: 300px; }

/* Scrubber */
.scrubber { grid-column: 1 / -1; height: 48px; padding: 8px 16px; cursor: pointer; position: relative; }
.scrubber-bar { height: 24px; background: #161b22; border-radius: 4px; position: relative; overflow: hidden; }
.scrubber-fill { height: 100%; background: #21262d; position: absolute; left: 0; top: 0; }
.scrubber-marker { position: absolute; top: 0; width: 2px; height: 100%; background: #58a6ff; z-index: 2; }
.phase-label { position: absolute; top: 26px; font-size: 10px; color: #484f58; }

/* Heatmap */
.heatmap-canvas { display: block; }

/* Transcript */
.tick-header { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #f0f6fc; }
.action-correct { color: #3fb950; font-weight: 600; }
.action-wrong { color: #f85149; font-weight: 600; }
.anomaly-tag { display: inline-block; padding: 2px 6px; background: #f8514922; color: #f85149; border-radius: 3px; font-size: 11px; margin-right: 4px; margin-bottom: 4px; }
.response-text { font-size: 12px; line-height: 1.6; white-space: pre-wrap; background: #161b22; padding: 12px; border-radius: 6px; max-height: 400px; overflow-y: auto; margin-top: 8px; }

/* Score dashboard */
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.score-card { background: #161b22; padding: 12px; border-radius: 6px; text-align: center; }
.score-card .value { font-size: 28px; font-weight: 700; }
.score-card .label { font-size: 11px; color: #8b949e; margin-top: 4px; }
.da-color { color: #58a6ff; }
.fc-color { color: #3fb950; }
.dfg-pos { color: #f85149; }
.dfg-neg { color: #3fb950; }
</style>
</head>
<body>

<div class="header">
  <h1>CoherenceBench Replay Viewer</h1>
  <div class="stats">
    <span>Scenario: <b>power_grid</b></span>
    <span>Ticks: <b>200</b></span>
    <span class="da">DA: <b>36.0%</b></span>
    <span class="dfg">DFG: <b>+70.0%</b></span>
  </div>
</div>

<div class="grid">
  <!-- Collapse Curve -->
  <div class="pane chart-pane">
    <div class="pane-title">Collapse Curve</div>
    <canvas id="collapseChart"></canvas>
  </div>

  <!-- Scrubber -->
  <div class="scrubber" id="scrubber">
    <div class="scrubber-bar" id="scrubberBar">
      <div class="scrubber-marker" id="scrubberMarker" style="left: 0%"></div>
    </div>
    <div id="phaseLabels"></div>
  </div>

  <!-- Heatmap -->
  <div class="pane heatmap-pane">
    <div class="pane-title">Subsystem Anomaly Heatmap (ground truth)</div>
    <canvas id="heatmapCanvas" class="heatmap-canvas"></canvas>
  </div>

  <!-- Transcript -->
  <div class="pane transcript-pane" id="transcriptPane">
    <div class="pane-title">Transcript</div>
    <div id="transcriptContent">Click a tick to view the model's response.</div>
  </div>

  <!-- Score Dashboard -->
  <div class="pane score-pane">
    <div class="pane-title">Score Dashboard</div>
    <div class="score-grid" id="scoreDashboard"></div>
  </div>
</div>

e immediately addressed despite rising frequency, as the grid is drawing down reserves unsustainably. Starting the gas turbine will close the supply-demand gap (generator deficit of 138MW requires approximately 150-160MW capacity accounting for ramp rates), stabilize frequency, and preserve battery reserves for critical contingencies. The strong renewable conditions and stable voltage environment support this measured response without requiring load-shedding.", "context_truncated": false}, {"tick": 2, "chosen_action": "emergency_disconnect", "correct_action": "shed_load", "acceptable_actions": ["deploy_battery", "ramp_plant", "shed_load", "start_gas_turbine"], "anomalous_factors": ["load", "generation", "frequency"], "is_multi_factor": false, "da": 0.0, "fc": 1.0, "response": "ANALYSIS:\n- Load: Total demand is 871MW across three zones (Zone A: 437MW, Zone B: 252MW, Zone C: 182MW), a slight increase of 4MW from the previous tick. Zone A continues to dominate consumption. Load pattern remains stable with no sudden spikes, indicating predictable demand evolution.\n\n- Generation: Total output has collapsed to 569MW due to Plant 3 tripping offline (loss of 157MW capacity). Combined with Plants 1, 2, and 4 operating at reduced or stable output (278MW, 197MW, 94MW respectively), the grid now faces a critical 302MW generation deficit\u2014more than double the previous tick's shortfall. This represents a major supply emergency.\n\n- Frequency: At 50.83 Hz and continuing to rise despite the massive generation deficit is highly anomalous and dangerous. This suggests the gas turbine started in Tick 1 may not have fully spun up yet, or the frequency measurement is lagging actual grid stress. The rising frequency reading masks what should be a frequency collapse scenario given the severe generation shortage.\n\n- Voltage: Transmission lines show slight voltage degradation (North: 412kV stable, South: dropped to 406kV from 408kV, East: dropped to 408kV from 410kV), indicating growing strain on the network from the generation deficit. South line voltage decline is most concerning and suggests increased current draw and reactive power demand.\n\n- Weather: Wind remains steady at 20 km/h and solar generation is strong, confirming renewable sources are contributing consistently. These favorable conditions are critical given the generation emergency but cannot alone bridge the 302MW gap.\n\n- Reserve: Battery remains at 79% (395MWh) with significant capacity, and gas turbine is still in STANDBY status (indicating it may not have started from Tick 1's action, or startup is incomplete). Spinning reserve of 150MW is insufficient to cover the 302MW deficit alone and will be quickly exhausted.\n\nACTION: emergency_disconnect\n\nREASON: With Plant 3 offline and a catastrophic 302MW generation deficit coupled with voltage degradation and an anomalously rising frequency reading suggesting sensor/control lag, the grid faces imminent collapse. Disconnecting non-critical load zones (likely Zone C at 182MW) protects grid stability and prevents cascading blackouts while the gas turbine spins up and system equilibrium is restored. This is the only viable action to prevent total system failure given the severity of the generation loss.", "context_truncated": false}, {"tick": 3, "chosen_action": "start_gas_turbine", "correct_action": "start_gas_turbine", "acceptable_actions": ["deploy_battery", "start_gas_turbine"], "anomalous_factors": ["generation"], "is_multi_factor": false, "da": 1.0, "fc": 1.0, "response": "ANALYSIS:\n- Load: Total demand is 727MW across three zones (Zone A: 290MW, Zone B: 256MW, Zone C: 181MW). Zone A load has dropped sharply by 147MW from Tick 2 (437MW to 290MW), indicating the emergency_disconnect action successfully shed non-essential load in that zone. Overall demand is now at manageable levels relative to available generation. Load distribution shows the emergency intervention achieved its stabilization objective.\n\n- Generation: T her output to maintain service.\n\n- Generation: Total output is 716MW from all four plants (Plant 1: 271MW, Plant 2: 187MW, Plant 3: 168MW, Plant 4: 90MW). Plant 4 has recovered online, and generation has increased substantially by 93MW from Tick 5. Critically, generation now nearly matches load (716MW vs 738MW demand), creating only a 22MW deficit\u2014the smallest shortage seen during this crisis sequence. The grid is approaching supply-demand equilibrium for the first time since Tick 1.\n\n- Frequency: At 50.15 Hz and stable, the grid frequency has normalized and is holding steady near nominal levels. The previous upward trend from Tick 5 has been arrested, and frequency now reflects the improved generation position. Stable frequency at this level indicates the grid is operating in a healthy, sustainable state without imminent collapse risk.\n\n- Voltage: Transmission line voltages are well-controlled (Line North: 416kV, Line South: 405kV, Line East: 408kV). All three lines remain within safe operating ranges with balanced profiles. North line has stabilized following the voltage correction, and no voltage instability is present. Transmission system health is confirmed.\n\n- Weather: Wind conditions remain steady at 18 km/h and solar generation remains strong. Renewable conditions have stabilized at favorable levels, providing consistent generation contribution without requiring curtailment. Weather forecast appears stable with no adverse conditions emerging.\n\n- Reserve: Battery capacity remains at 391MWh (78%), indicating discharge has halted and battery state-of-charge is stable. Gas turbine is still in STANDBY status despite five consecutive ticks of recommendations to deploy it. Spinning reserve stands at 151MW, which now represents 6-7x coverage of the minimal 22MW deficit, indicating adequate contingency capacity for normal operations.\n\nACTION: hold_steady\n\nREASON: The grid has achieved near-equilibrium with only a 22MW deficit, frequency is stable, aving exceptional conditions and surplus generation\u2014suggests either emergency load-shedding occurred without documented action, system controls deployed reserves in hidden emergency mode, or the system has reset and measurement systems are corrupt. Battery is effectively exhausted with only 8% charge and minimal discharge capability. Gas turbine status shows OFFLINE\u2014critically, the unit is non-functional and unavailable. Spinning reserve has plummeted to only 28MW, covering 64% of the 44MW deficit. The grid is operating with virtually NO backup capacity and faces imminent uncontrolled collapse despite adequate exceptional renewable generation (70-80MW).\n\nACTION: emergency_disconnect\n\nREASON: The grid faces systemic collapse despite the modest 44MW deficit and exceptional renewable generation (70-80MW from record 30 km/h wind): battery is catastrophically exhausted at 8%, gas turbine is OFFLINE and non-functional, and spinning reserve at only 28MW provides marginal coverage. The massive unexplained battery discharge from Tick 57 (394MWh to 42MWh) indicates system is in hidden emergency state despite appearing stable conditions. Zone B's demand concentration at 394MW creates additional transmission corridor stress. The rising frequency masks underlying systemic reserve failure\u2014reserves are non-functional despite adequate renewable support. Emergency disconnection of Zone C (141MW) is essential immediately to: (1) eliminate the deficit entirely and create 97MW surplus (141MW exceeds 44MW deficit), (2) enable immediate reserve recovery and system reset, (3) allow battery restoration and gas turbine recovery to operational status, and (4) prevent cascading blackout. This is critical despite exceptional renewable generation\u2014the reserve control systems have failed systemically.", "context_truncated": false}, {"tick": 59, "chosen_action": "start_gas_turbine", "correct_action": "start_gas_turbine", "acceptable_actions": ["deploy_battery", "start_gas_t function rollingAvg(arr, w) {
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    const start = Math.max(0, i - w + 1);
    const slice = arr.slice(start, i + 1);
    result.push(slice.reduce((a, b) => a + b, 0) / slice.length);
  }
  return result;
}

  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    scales: {
      x: { display: true, grid: { color: '#21262d' }, ticks: { color: '#484f58', maxTicksLimit: 20 } },
      y: { display: true, min: 0, max: 1, grid: { color: '#21262d' }, ticks: { color: '#484f58', callback: v => (v * 100) + '%' } }
    },
    plugins: {
      legend: { labels: { color: '#8b949e', font: { size: 11 } } },
      tooltip: { enabled: true }
    }
  }
});

// --- Scrubber ---
const scrubberBar = document.getElementById('scrubberBar');
const scrubberMarker = document.getElementById('scrubberMarker');
const phaseLabelsEl = document.getElementById('phaseLabels');

phases.forEach((p, i) => {
  if (p.start > 0) {
    const pct = (p.start / ticks.length) * 100;
    const div = document.createElement('div');
    div.style.cssText = `position:absolute;left:${pct}%;top:0;height:24px;width:1px;background:#484f58;`;
    scrubberBar.appendChild(div);
  }
  const label = document.createElement('div');
  label.className = 'phase-label';
  const midPct = ((p.start + p.end) / 2 / ticks.length) * 100;
  label.style.left = midPct + '%';
  label.textContent = `Phase ${i + 1}`;
  phaseLabelsEl.appendChild(label);
});

function selectTick(idx) {
  currentTick = Math.max(0, Math.min(idx, ticks.length - 1));
  const pct = (currentTick / (ticks.length - 1)) * 100;
  scrubberMarker.style.left = pct + '%';
  updateTranscript();
  updateScoreDashboard();
}

scrubberBar.addEventListener('click', (e) => {
  const rect = scrubberBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  selectTick(Math.round(pct * (ticks.length - 1)));
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') selectTick(currentTick + 1);
  if (e.key === 'ArrowLeft') selectTick(currentTick - 1);
});

// --- Heatmap ---
const heatmapCanvas = document.getElementById('heatmapCanvas');
const factorNames = ['load', 'generation', 'frequency', 'voltage', 'weather', 'reserve'];
const cellW = Math.max(4, Math.floor((heatmapCanvas.parentElement.clientWidth - 32) / ticks.length));
const cellH = 16;
heatmapCanvas.width = cellW * ticks.length;
heatmapCanvas.height = cellH * factorNames.length;
const hctx = heatmapCanvas.getContext('2d');

function getPhaseWeight(tickIdx, factor) {
  for (const p of phases) {
    if (tickIdx >= p.start && tickIdx < p.end) return p.weights[factor] || 0;
  }
  return 0;
}

for (let fi = 0; fi < factorNames.length; fi++) {
  for (let ti = 0; ti < ticks.length; ti++) {
    const w = getPhaseWeight(ti, factorNames[fi]);
    const alpha = Math.min(w * 2.5, 1);
    hctx.fillStyle = `rgba(88, 166, 255, ${alpha})`;
    hctx.fillRect(ti * cellW, fi * cellH, cellW - 1, cellH - 1);

    // Dot if this factor was actually anomalous
    if (ticks[ti].anomalous_factors.includes(factorNames[fi])) {
      hctx.fillStyle = '#f85149';
      hctx.beginPath();
      hctx.arc(ti * cellW + cellW/2, fi * cellH + cellH/2, 2, 0, Math.PI * 2);
      hctx.fill();
    }
  }
}

// Factor labels
hctx.fillStyle = '#8b949e';
hctx.font = '10px monospace';
// Labels drawn outside canvas — use overlay div instead

// --- Transcript ---
function updateTranscript() {
  const t = ticks[currentTick];
  const isCorrect = t.da > 0;
  const actionClass = isCorrect ? 'action-correct' : 'action-wrong';

  let anomalyTags = '';
  if (t.anomalous_factors.length > 0) {
    anomalyTags = t.anomalous_factors.map(f => `<span class="anomaly-tag">${f}</span>`).join('');
  } else {
    anomalyTags = '<span style="color:#8b949e;font-size:11px;">no anomaly</span>';
  }

  document.getElementById('transcriptContent').innerHTML = `
    <div class="tick-header">Tick ${t.tick} / ${ticks.length}</div>
    <div style="margin-bottom:8px;">
      Action: <span class="${actionClass}">${t.chosen_action}</span>
      ${isCorrect ? '&#10003;' : '&#10007; expected: ' + t.correct_action}
      ${t.is_multi_factor ? ' <span style="color:#d2a8ff;font-size:11px;">[multi-factor]</span>' : ''}
    </div>
    <div style="margin-bottom:8px;">Anomalous: ${anomalyTags}</div>
    <div class="response-text">${escapeHtml(t.response)}</div>
  `;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- Score Dashboard ---
function updateScoreDashboard() {
  const idx = currentTick;
  const window = 40;

  // Cumulative DA/FC up to current tick
  const daSlice = daValues.slice(0, idx + 1);
  const fcSlice = fcValues.slice(0, idx + 1);
  const daAvg = daSlice.reduce((a, b) => a + b, 0) / daSlice.length;
  const fcAvg = fcSlice.reduce((a, b) => a + b, 0) / fcSlice.length;

  // DFG at current position
  const first = daValues.slice(0, Math.min(window, idx + 1));
  const last = idx >= window ? daValues.slice(Math.max(0, idx + 1 - window), idx + 1) : first;
  const daFirst = first.reduce((a, b) => a + b, 0) / first.length;
  const daLast = last.reduce((a, b) => a + b, 0) / last.length;
  const dfg = daFirst - daLast;
  const dfgClass = dfg > 0 ? 'dfg-pos' : 'dfg-neg';

  document.getElementById('scoreDashboard').innerHTML = `
    <div class="score-card"><div class="value da-color">${(daAvg * 100).toFixed(1)}%</div><div class="label">DA (cumulative)</div></div>
    <div class="score-card"><div class="value fc-color">${(fcAvg * 100).toFixed(1)}%</div><div class="label">FC (cumulative)</div></div>
    <div class="score-card"><div class="value da-color">${(daFirst * 100).toFixed(1)}%</div><div class="label">DA @ first ${Math.min(window, idx + 1)}</div></div>
    <div class="score-card"><div class="value da-color">${(daLast * 100).toFixed(1)}%</div><div class="label">DA @ last ${Math.min(window, idx + 1)}</div></div>
    <div class="score-card"><div class="value ${dfgClass}">${dfg >= 0 ? '+' : ''}${(dfg * 100).toFixed(1)}%</div><div class="label">DFG (fade gap)</div></div>
    <div class="score-card"><div class="value" style="color:#c9d1d9;">${idx + 1}</div><div class="label">Current tick</div></div>
  `;
}

// Initialize
selectTick(0);
</script>
</body>
</html>
